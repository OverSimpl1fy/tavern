<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow-x: hidden;
        font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif;
        color: #d8d0c0;
      }

      .task-card {
        width: 100%;
        max-width: 560px;
        margin: 20px auto;
        background: linear-gradient(
          175deg,
          #1a1a36 0%,
          #111128 40%,
          #0d0d22 100%
        );
        border: 1px solid #3a3050;
        border-radius: 6px;
        overflow: hidden;
        box-shadow:
          0 0 30px rgba(180, 130, 50, 0.08),
          0 8px 32px rgba(0, 0, 0, 0.5);
      }

      .card-ornament {
        height: 3px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(180, 130, 50, 0.2) 15%,
          #c9a959 30%,
          #f0d680 50%,
          #c9a959 70%,
          rgba(180, 130, 50, 0.2) 85%,
          transparent 100%
        );
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 20px 24px 0;
      }

      .rank-badge {
        flex-shrink: 0;
        width: 42px;
        height: 42px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        font-weight: 900;
        border-radius: 3px;
        background: linear-gradient(135deg, #666, #333);
        color: #fff;
      }

      .rank-badge[data-rank="S"] {
        background: linear-gradient(135deg, #ffd700, #b8860b);
        color: #1a1a00;
        box-shadow: 0 0 18px rgba(255, 215, 0, 0.35);
      }

      .rank-badge[data-rank="A"] {
        background: linear-gradient(135deg, #ff5555, #b02020);
        color: #fff;
        box-shadow: 0 0 18px rgba(255, 80, 80, 0.3);
      }

      .rank-badge[data-rank="B"] {
        background: linear-gradient(135deg, #5599ff, #2050c0);
        color: #fff;
        box-shadow: 0 0 18px rgba(80, 140, 255, 0.3);
      }

      .rank-badge[data-rank="C"] {
        background: linear-gradient(135deg, #55cc66, #208830);
        color: #fff;
        box-shadow: 0 0 18px rgba(80, 200, 100, 0.25);
      }

      .rank-badge[data-rank="D"] {
        background: linear-gradient(135deg, #999, #555);
        color: #fff;
      }

      .task-name {
        font-size: 1.25rem;
        font-weight: 700;
        color: #f0e0b8;
        letter-spacing: 0.06em;
        line-height: 1.3;
      }

      .task-type-tag {
        display: inline-block;
        font-size: 0.72rem;
        padding: 2px 10px;
        border-radius: 2px;
        margin-top: 4px;
        letter-spacing: 0.08em;
        background: rgba(180, 130, 50, 0.18);
        color: #d4a854;
        border: 1px solid rgba(180, 130, 50, 0.3);
      }

      .task-type-tag[data-type="个人"] {
        background: rgba(140, 120, 180, 0.18);
        color: #b8a0d8;
        border: 1px solid rgba(140, 120, 180, 0.3);
      }

      .card-body {
        padding: 18px 24px 20px;
      }

      .info-row {
        display: flex;
        gap: 14px;
        align-items: baseline;
        margin-bottom: 6px;
      }

      .info-key {
        font-size: 0.78rem;
        color: #7a6e58;
        letter-spacing: 0.1em;
        white-space: nowrap;
        font-weight: 600;
        min-width: 36px;
      }

      .info-val {
        font-size: 0.9rem;
        color: #c8bfa8;
        line-height: 1.5;
      }

      .info-val.cost {
        color: #e8c060;
        font-weight: 600;
      }

      .info-val.deadline {
        color: #e06060;
        font-weight: 600;
      }

      .detail-block {
        margin: 10px 0 6px;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.015);
        border-left: 2px solid rgba(180, 130, 50, 0.25);
        border-radius: 0 4px 4px 0;
        font-size: 0.85rem;
        color: #b0a590;
        line-height: 1.65;
      }

      .reward-box {
        margin: 14px 0 6px;
        padding: 16px 18px;
        background: linear-gradient(
          135deg,
          rgba(180, 130, 50, 0.04),
          rgba(180, 130, 50, 0.01)
        );
        border: 1px solid rgba(180, 130, 50, 0.18);
        border-radius: 4px;
      }

      .reward-box .rw-title {
        font-size: 0.78rem;
        color: #b8860b;
        letter-spacing: 0.1em;
        font-weight: 700;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .reward-box .rw-title::after {
        content: "";
        flex: 1;
        height: 1px;
        background: linear-gradient(
          90deg,
          rgba(180, 130, 50, 0.3),
          transparent
        );
      }

      .rw-list {
        font-size: 0.88rem;
        color: #d8c888;
        line-height: 1.6;
      }

      .rw-split {
        display: flex;
        gap: 20px;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px dashed rgba(180, 130, 50, 0.2);
        font-size: 0.82rem;
      }

      .rw-split > div {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .rw-split .sl {
        color: #7a6e58;
        font-size: 0.72rem;
      }

      .rw-split .sv {
        color: #e8d090;
        font-weight: 600;
      }

      .claim-block {
        margin-top: 10px;
        padding: 10px 16px;
        background: rgba(120, 180, 220, 0.04);
        border: 1px solid rgba(120, 180, 220, 0.15);
        border-radius: 4px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.84rem;
        color: #a0c8e8;
      }

      .extra-box {
        margin-top: 12px;
        padding: 10px 16px;
        background: rgba(255, 255, 255, 0.01);
        border: 1px dashed rgba(255, 255, 255, 0.06);
        border-radius: 4px;
      }

      .extra-box .ex-title {
        font-size: 0.72rem;
        color: #5a5040;
        letter-spacing: 0.12em;
        margin-bottom: 6px;
      }

      .extra-box .ex-row {
        display: flex;
        gap: 8px;
        padding: 2px 0;
        font-size: 0.8rem;
      }

      .extra-box .ex-row .ek {
        color: #5a5040;
      }

      .extra-box .ex-row .ev {
        color: #908878;
      }
    </style>
  </head>

  <body>
    <script type="text/template" id="raw">
      $1
    </script>
    <div id="card"></div>
    <script>
      ~(function () {
        var e = document.getElementById("raw");
        if (!e) return;
        var r = e.textContent.trim();
        if (!r) return;
        var f = { extra: [] };
        r.split(/\r?\n/).forEach(function (l) {
          var s = l.trim();
          if (!s) return;
          var m = s.match(/^(\S+?)[：:]\s*([\s\S]*)/);
          if (!m) return;
          var k = m[1],
            v = m[2];
          switch (k) {
            case "任务":
              var nm = v.match(/\[?([^\]]+?)\]?\s*[（(]\s*([^)）]+?)\s*[)）]/);
              if (nm) {
                f.taskName = nm[1].trim();
                f.taskType = nm[2].trim();
              } else {
                f.taskName = v.replace(/[\[\]]/g, "").trim();
                f.taskType = "";
              }
              break;
            case "委托":
              f.commissioner = v.replace(/[\[\]]/g, "").trim();
              break;
            case "等级":
              f.rank = v.replace(/[\[\]]/g, "").trim();
              break;
            case "详情":
              var br = [],
                rt = v,
                bre = /^\[((?:[^\[\]]|\[[^\[\]]*\])*)\]\s*/;
              for (var bm; (bm = rt.match(bre)); ) {
                br.push(bm[1]);
                rt = rt.slice(bm[0].length);
              }
              f.background = br[0] || "";
              f.cost = br.length >= 2 ? br[1] : "";
              break;
            case "目标":
              var ps = v.split(/[；;]/);
              f.objective = (ps[0] || "").replace(/^\[|\]$/g, "").trim();
              f.deadline = (ps[1] || "").replace(/^\[|\]$/g, "").trim();
              break;
            case "奖励":
              var rm = v.match(/^\[((?:[^\[\]]|\[[^\[\]]*\])*)\]\s*/);
              f.reward = rm ? rm[1] : "";
              var af = v.slice(rm ? rm[0].length : 0);
              var tm = af.match(
                /团队需标明[（(]\s*([^|]+?)\s*\|\s*([^)）]+?)\s*[)）]/,
              );
              if (tm) {
                f.totalReward = tm[1].trim();
                f.userShare = tm[2].trim();
              }
              var cm = af.match(/领取方式[：:]\s*\[([^\]]+)\]/);
              f.claimInfo = cm ? cm[1].trim() : "";
              break;
            default:
              f.extra.push({ key: k, value: v.replace(/[\[\]]/g, "").trim() });
          }
        });
        function x(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }
        var h = [];
        h.push('<div class="task-card">');
        h.push('<div class="card-ornament"></div><div class="card-header">');
        h.push(
          '<div class="rank-badge" data-rank="' +
            x(f.rank || "?") +
            '">' +
            x(f.rank || "?") +
            "</div>",
        );
        h.push(
          '<div style="flex:1;min-width:0"><div class="task-name">' +
            x(f.taskName || "未知任务") +
            "</div>",
        );
        if (f.taskType)
          h.push(
            '<span class="task-type-tag" data-type="' +
              x(f.taskType) +
              '">' +
              x(f.taskType) +
              "任务</span>",
          );
        h.push('</div></div><div class="card-body">');
        h.push(
          '<div class="info-row"><span class="info-key">委托</span><span class="info-val">' +
            x(f.commissioner || "—") +
            "</span></div>",
        );
        h.push(
          '<div class="info-row"><span class="info-key">消耗</span><span class="info-val cost">' +
            x(f.cost || "—") +
            "</span></div>",
        );
        if (f.background)
          h.push('<div class="detail-block">' + x(f.background) + "</div>");
        h.push(
          '<div class="info-row"><span class="info-key">目标</span><span class="info-val">' +
            x(f.objective || "—") +
            "</span></div>",
        );
        h.push(
          '<div class="info-row"><span class="info-key">截止</span><span class="info-val deadline">&#x23F0; ' +
            x(f.deadline || "—") +
            "</span></div>",
        );
        if (f.reward || f.totalReward || f.userShare) {
          h.push(
            '<div class="reward-box"><div class="rw-title">&#x1F381; 任务报酬</div>',
          );
          if (f.reward)
            h.push('<div class="rw-list">' + x(f.reward) + "</div>");
          if (f.totalReward || f.userShare) {
            h.push(
              '<div class="rw-split"><div><span class="sl">&#x1F4CA; 总奖励估值</span><span class="sv">' +
                x(f.totalReward || "—") +
                '</span></div><div><span class="sl">&#x1F4B0; 你的份额</span><span class="sv">' +
                x(f.userShare || "—") +
                "</span></div></div>",
            );
          }
          h.push("</div>");
        }
        if (f.claimInfo)
          h.push(
            '<div class="claim-block">&#x1F4CD; ' + x(f.claimInfo) + "</div>",
          );
        if (f.extra.length) {
          h.push(
            '<div class="extra-box"><div class="ex-title">&#x1F4CB; 补充信息</div>',
          );
          f.extra.forEach(function (ex) {
            h.push(
              '<div class="ex-row"><span class="ek">' +
                x(ex.key) +
                '：</span><span class="ev">' +
                x(ex.value) +
                "</span></div>",
            );
          });
          h.push("</div>");
        }
        h.push("</div></div>");
        document.getElementById("card").innerHTML = h.join("");
      })();
    </script>
  </body>
</html>
