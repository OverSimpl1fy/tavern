<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>命运任务板 · Destiny Quest Board</title>
<style>
  /* ===== Reset & Base ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #06060f;
    background-image:
      radial-gradient(ellipse at 20% 15%, rgba(180,130,60,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 85%, rgba(120,80,180,0.05) 0%, transparent 60%),
      radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 55% 12%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 75% 45%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 30% 70%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1px 1px at 90% 20%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1px 1px at 10% 85%, rgba(255,255,255,0.45), transparent),
      radial-gradient(1.5px 1.5px at 60% 75%, rgba(255,255,255,0.3), transparent);
    font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", "STSong", "Songti SC", Georgia, serif;
    color: #d8d0c0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  /* ===== Page Header ===== */
  .page-header {
    text-align: center;
    margin-bottom: 48px;
  }
  .page-header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    background: linear-gradient(180deg, #f0d680 0%, #b8860b 50%, #8b6508 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .page-header .subtitle {
    font-size: 0.85rem;
    color: #6b5e4a;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  /* ===== Cards Container ===== */
  .cards-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
    gap: 36px;
    width: 100%;
    max-width: 1200px;
    justify-items: center;
  }

  /* ===== Single Card ===== */
  .task-card {
    width: 100%;
    max-width: 560px;
    background: linear-gradient(175deg, #1a1a36 0%, #111128 40%, #0d0d22 100%);
    border: 1px solid #3a3050;
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 30px rgba(180, 130, 50, 0.08),
      0 8px 32px rgba(0, 0, 0, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.02);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    animation: cardIn 0.6s ease backwards;
  }
  .task-card:hover {
    transform: translateY(-4px);
    box-shadow:
      0 0 50px rgba(180, 130, 50, 0.14),
      0 12px 40px rgba(0, 0, 0, 0.55),
      inset 0 1px 0 rgba(255, 255, 255, 0.03);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Card stagger (up to 10 cards) */
  .task-card:nth-child(1) { animation-delay: 0.00s; }
  .task-card:nth-child(2) { animation-delay: 0.12s; }
  .task-card:nth-child(3) { animation-delay: 0.24s; }
  .task-card:nth-child(4) { animation-delay: 0.36s; }
  .task-card:nth-child(5) { animation-delay: 0.48s; }
  .task-card:nth-child(6) { animation-delay: 0.60s; }
  .task-card:nth-child(7) { animation-delay: 0.72s; }
  .task-card:nth-child(8) { animation-delay: 0.84s; }
  .task-card:nth-child(9) { animation-delay: 0.96s; }
  .task-card:nth-child(10){ animation-delay: 1.08s; }

  /* ===== Card Top Ornament ===== */
  .card-ornament {
    height: 3px;
    background: linear-gradient(90deg,
      transparent 0%, rgba(180,130,50,0.2) 15%, #c9a959 30%, #f0d680 50%,
      #c9a959 70%, rgba(180,130,50,0.2) 85%, transparent 100%);
  }

  /* ===== Card Header ===== */
  .card-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 24px 0;
  }
  .rank-badge {
    flex-shrink: 0;
    width: 42px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; font-weight: 900;
    border-radius: 3px;
    letter-spacing: 0.05em;
    /* fallback when data-rank is missing / unrecognized */
    background: linear-gradient(135deg, #666, #333);
    color: #fff;
    box-shadow: 0 0 12px rgba(150,150,150,0.2);
  }
  /* ── Rank colors via data-rank attribute ── */
  .rank-badge[data-rank="S"] { background: linear-gradient(135deg, #ffd700, #b8860b); color: #1a1a00; box-shadow: 0 0 18px rgba(255,215,0,0.35); }
  .rank-badge[data-rank="A"] { background: linear-gradient(135deg, #ff5555, #b02020); color: #fff; box-shadow: 0 0 18px rgba(255,80,80,0.3); }
  .rank-badge[data-rank="B"] { background: linear-gradient(135deg, #5599ff, #2050c0); color: #fff; box-shadow: 0 0 18px rgba(80,140,255,0.3); }
  .rank-badge[data-rank="C"] { background: linear-gradient(135deg, #55cc66, #208830); color: #fff; box-shadow: 0 0 18px rgba(80,200,100,0.25); }
  .rank-badge[data-rank="D"] { background: linear-gradient(135deg, #999, #555); color: #fff; box-shadow: 0 0 12px rgba(150,150,150,0.2); }

  .task-title-group { flex: 1; min-width: 0; }
  .task-name {
    font-size: 1.25rem; font-weight: 700;
    color: #f0e0b8;
    letter-spacing: 0.06em;
    line-height: 1.3;
  }
  .task-type-tag {
    display: inline-block;
    font-size: 0.72rem;
    padding: 2px 10px;
    border-radius: 2px;
    margin-top: 4px;
    letter-spacing: 0.08em;
    /* fallback */
    background: rgba(180,130,50,0.18); color: #d4a854; border: 1px solid rgba(180,130,50,0.3);
  }
  /* ── Type tag colors via data-type attribute ── */
  .task-type-tag[data-type="团队"] { background: rgba(180,130,50,0.18); color: #d4a854; border: 1px solid rgba(180,130,50,0.3); }
  .task-type-tag[data-type="个人"] { background: rgba(140,120,180,0.18); color: #b8a0d8; border: 1px solid rgba(140,120,180,0.3); }

  /* ===== Card Body ===== */
  .card-body { padding: 18px 24px 20px; }

  /* ===== Info Rows ===== */
  .info-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px 16px;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .info-label {
    font-size: 0.78rem;
    color: #7a6e58;
    letter-spacing: 0.1em;
    white-space: nowrap;
    text-transform: uppercase;
    font-weight: 600;
  }
  .info-value {
    font-size: 0.9rem;
    color: #c8bfa8;
    line-height: 1.5;
  }
  .info-value.cost {
    color: #e8c060;
    font-weight: 600;
  }
  .info-value.deadline {
    color: #e06060;
    font-weight: 600;
  }
  .commissioner-mark {
    display: inline-block;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, #8b5cf6, #6366f1);
    color: #fff;
    text-align: center;
    line-height: 20px;
    font-size: 0.6rem;
    margin-right: 6px;
    vertical-align: middle;
    flex-shrink: 0;
  }

  /* ===== Detail Section ===== */
  .detail-block {
    margin: 10px 0 6px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.015);
    border-left: 2px solid rgba(180,130,50,0.25);
    border-radius: 0 4px 4px 0;
    font-size: 0.85rem;
    color: #b0a590;
    line-height: 1.65;
  }

  /* ===== Reward Section ===== */
  .reward-section {
    margin: 14px 0 6px;
    padding: 16px 18px;
    background: linear-gradient(135deg, rgba(180,130,50,0.04), rgba(180,130,50,0.01));
    border: 1px solid rgba(180,130,50,0.18);
    border-radius: 4px;
  }
  .reward-section .section-title {
    font-size: 0.78rem;
    color: #b8860b;
    letter-spacing: 0.1em;
    font-weight: 700;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .reward-section .section-title::after {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(180,130,50,0.3), transparent);
  }
  .reward-content {
    font-size: 0.88rem;
    color: #d8c888;
    line-height: 1.6;
  }
  .reward-split {
    display: flex;
    gap: 20px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed rgba(180,130,50,0.2);
    font-size: 0.82rem;
  }
  .reward-split-item {
    display: flex; flex-direction: column; gap: 2px;
  }
  .reward-split-item .split-label { color: #7a6e58; font-size: 0.72rem; }
  .reward-split-item .split-value { color: #e8d090; font-weight: 600; }

  /* ===== Claim Section ===== */
  .claim-block {
    margin-top: 10px;
    padding: 10px 16px;
    background: rgba(120,180,220,0.04);
    border: 1px solid rgba(120,180,220,0.15);
    border-radius: 4px;
    display: flex; align-items: center; gap: 10px;
    font-size: 0.84rem;
  }
  .claim-icon {
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .claim-text {
    color: #a0c8e8;
    line-height: 1.5;
  }

  /* ===== Responsive ===== */
  @media (max-width: 560px) {
    .cards-container { grid-template-columns: 1fr; }
    .card-header { padding: 14px 14px 0; gap: 10px; }
    .card-body { padding: 12px 14px 16px; }
    .task-name { font-size: 1.1rem; }
    .info-grid { gap: 6px 10px; }
    .reward-split { flex-direction: column; gap: 6px; }
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>✦ 命 运 任 务 板 ✦</h1>
  <p class="subtitle">Destiny Quest Board</p>
</div>

<div class="cards-container" id="cards-container">
  <!-- 正则替换结果渲染于此 -->
</div>

<script>
(function() {
  // ═══════════════════════════════════════════════════════
  //  唯一正则（查找模式）
  //  12 个编号捕获组 ($1 ~ $12)，对应替换模板
  // ═══════════════════════════════════════════════════════
  const TASK_REGEX = /<task_info>\s*任务[：:]\s*\[([^\]]+)\]\s*[（(]\s*([^)）\r\n]+?)\s*[)）]\s*[\r\n]+\s*委托[：:]\s*([^\r\n]+?)\s*[\r\n]+\s*等级[：:]\s*\[?([^\r\n\]]+?)\]?\s*[\r\n]+\s*详情[：:]\s*\[([^\]]+)\]\s*\[([^\]]+)\]\s*[\r\n]+\s*目标[：:]\s*\[([^\]]+)\]\s*[；;]\s*\[([^\]]+)\]\s*[\r\n]+\s*奖励[：:]\s*\[((?:[^\[\]]|\[[^\[\]]*\])*)\]\s*[；;]\s*团队需标明[（(]\s*([^|]+?)\s*\|\s*([^)）]+?)\s*[)）]\s*[；;]\s*领取方式[：:]\s*\[([^\]]+)\]\s*<\/task_info>/g;

  // ═══════════════════════════════════════════════════════
  //  替换模板（$1~$12 引用捕获组，纯字符串替换）
  //  $1=任务名 $2=类型 $3=委托人 $4=等级
  //  $5=背景   $6=消耗 $7=目标   $8=截止
  //  $9=奖励   $10=总奖 $11=份额 $12=领取
  // ═══════════════════════════════════════════════════════
  const CARD_TEMPLATE = `<div class="task-card">
  <div class="card-ornament"></div>
  <div class="card-header">
    <div class="rank-badge" data-rank="$4">$4</div>
    <div class="task-title-group">
      <div class="task-name">$1</div>
      <span class="task-type-tag" data-type="$2">$2任务</span>
    </div>
  </div>
  <div class="card-body">
    <div class="info-grid">
      <span class="info-label">委托</span>
      <span class="info-value"><span class="commissioner-mark">◆</span>$3</span>
      <span class="info-label">消耗</span>
      <span class="info-value cost">$6</span>
    </div>
    <div class="detail-block">$5</div>
    <div class="info-grid" style="margin-top:8px;">
      <span class="info-label">目标</span>
      <span class="info-value">$7</span>
      <span class="info-label">截止</span>
      <span class="info-value deadline">&#x23F0; $8</span>
    </div>
    <div class="reward-section">
      <div class="section-title">&#x1F381; 任务报酬</div>
      <div class="reward-content">$9</div>
      <div class="reward-split">
        <div class="reward-split-item">
          <span class="split-label">&#x1F4CA; 总奖励估值</span>
          <span class="split-value">$10</span>
        </div>
        <div class="reward-split-item">
          <span class="split-label">&#x1F4B0; 你的份额</span>
          <span class="split-value">$11</span>
        </div>
      </div>
    </div>
    <div class="claim-block">
      <span class="claim-icon">&#x1F4CD;</span>
      <span class="claim-text">$12</span>
    </div>
  </div>
</div>`;

  // ── 一次 replace 完成全部替换 ──
  const rawText = document.getElementById('task-template').textContent;
  const container = document.getElementById('cards-container');
  container.innerHTML = rawText.replace(TASK_REGEX, CARD_TEMPLATE) || '<p style="text-align:center;color:#6b5e4a;padding:40px;">未找到任务数据</p>';
})();
</script>

</body>
</html>
